<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../plugin/bootstrap-5.3.2-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../plugin/RemixIcon_Fonts_v4.1.0/rimix-icon/remixicon.css">
    <title>Document</title>
</head>
<body class="bg-light">
    <header>
        <h1 class="bg-white p-2">BoosterX</h1>
    </header>
    <div style="max-width: 400px;" class="bg-white my-3 mx-auto p-3">
        <div>
            <div class="text-center h4 my-1">
                Welcome to Boosterx Admin
            </div>
            <div class="my-2">
                <div class="text-center py-2">
                    provide login password
                </div>
                <div>
                    <input type="password" class="form-control" placeholder="enter password">
                </div>
            </div>
            <div class="my-2">
                <button  class="w-100 btn border-0 p-2 btn-warning">
                    continue to admin
                </button>
            </div>
            <div class="text-center my-3" style="font-size: small;">
                I can't remember my password? <br>
                <a href="">click me</a>
            </div>
        </div>
    </div>
    <script>
       async function login(){
            const email=document.getElementById("email").value.trim();
            if (email == ""){
                alert("provide the valid email address")
            }
            else{
                const req=await fetch("/login",{
                    method: "post",
                    body: JSON.stringify({email:email})
                }).then(res => res.json());
                console.log(req);
                if(req.status === true){
                    window.location.href="password.html"
                }
                else{
                    alert(req.message)
                }
            }
        }
    </script>
</body>
</html>
